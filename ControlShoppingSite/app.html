<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser avec Toolbar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; flex-direction: column; height: 100vh; font-family: Arial, sans-serif; }
    .toolbar-container {
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
      flex-shrink: 0;
    }
    .toolbar-row {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
    }
    .toolbar-row:first-child { padding-top: 6px; gap: 8px; }
    .toolbar-row:last-child { padding-bottom: 6px; }
    .toolbar-row button {
      padding: 8px 16px;
      border: 1px solid #aaa;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar-row button:hover { background: #e0e0e0; }
    .toolbar-row button.active {
      background: #4CAF50; color: #fff; border-color: #388E3C;
      animation: glowPulse 1.5s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 6px rgba(76,175,80,0.4); }
      50% { box-shadow: 0 0 18px rgba(76,175,80,0.9), 0 0 30px rgba(76,175,80,0.4); }
    }
    .url-bar {
      flex: 1;
      padding: 6px 12px;
      border: 1px solid #aaa;
      border-radius: 4px;
      font-size: 14px;
    }
    .status-bar {
      padding: 6px 12px;
      background: #fffde7;
      border-bottom: 1px solid #f0e68c;
      font-size: 13px;
      color: #555;
      display: none;
      flex-shrink: 0;
    }
    .status-bar.visible { display: block; }
    webview { flex: 1; width: 100%; }

    /* Panel produit en haut */
    .product-panel {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #fff;
      z-index: 1000;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      padding: 12px 16px;
      overflow-y: auto;
      max-height: 80vh;
      animation: slideDown 0.25s ease-out;
    }
    @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    .product-panel.visible { display: block; }
    .product-panel .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .product-panel .panel-header h3 {
      margin: 0; font-size: 15px;
      transition: opacity 0.2s ease, max-width 0.2s ease;
      overflow: hidden;
      white-space: nowrap;
    }
    .product-panel.minimized .panel-header h3 { opacity: 0; max-width: 0; margin: 0; }
    .product-panel .panel-header .header-btns { display: flex; gap: 4px; }
    .product-panel .panel-header button {
      background: none; border: 1px solid #ccc; font-size: 13px;
      cursor: pointer; color: #555; padding: 3px 10px; border-radius: 4px;
      font-family: Arial, sans-serif;
    }
    .product-panel .panel-header button:hover { background: #eee; color: #333; }
    .product-panel .collapsible {
      max-height: 2000px; opacity: 1;
      transition: max-height 0.3s ease, opacity 0.2s ease;
      overflow: hidden;
    }
    .product-panel.minimized .collapsible { max-height: 0; opacity: 0; padding: 0; }
    .product-panel img { max-width: 100%; max-height: 200px; object-fit: contain; border-radius: 4px; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto; }

    /* Champs éditables */
    .field-row { margin-bottom: 6px; font-size: 13px; }
    .field-row .field-inline { display: flex; align-items: center; gap: 6px; }
    .field-row label { font-weight: bold; color: #333; white-space: nowrap; min-width: 50px; }
    .field-row input {
      flex: 1; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px;
      font-size: 13px; font-family: Arial, sans-serif;
    }
    .field-row input:focus { border-color: #4CAF50; outline: none; box-shadow: 0 0 3px rgba(76,175,80,0.3); }

    /* Boutons suggestions textes trouvés */
    .suggestions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .suggestions .sug-btn {
      padding: 2px 8px; font-size: 11px; border: 1px solid #ddd; border-radius: 12px;
      background: #f5f5f5; cursor: pointer; color: #333; max-width: 250px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .suggestions .sug-btn:hover { background: #e0f2f1; border-color: #4CAF50; }
    .suggestions .sug-btn .sug-pos {
      font-size: 9px; color: #999; margin-right: 3px; text-transform: uppercase;
    }

    .product-panel .panel-actions { margin-top: 10px; }
    .product-panel .close-btn {
      padding: 6px 16px; background: #e53935; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    .product-panel .save-btn {
      padding: 6px 16px; margin-right: 6px; background: #4CAF50; color: #fff;
      border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
    }

    /* Hourglass pendant chargement */
    .webview-wrapper {
      flex: 1;
      position: relative;
      display: flex;
    }
    .loading-indicator {
      display: none;
      padding: 3px 10px;
      background: #e3f2fd;
      border-bottom: 1px solid #90caf9;
      font-size: 12px;
      color: #1565c0;
      flex-shrink: 0;
    }
    .loading-indicator.visible { display: flex; align-items: center; gap: 6px; }
    .spinner {
      width: 14px; height: 14px; border: 2px solid #90caf9;
      border-top-color: #1565c0; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="toolbar-container">
    <div class="toolbar-row">
      <button id="btnCatalogue">Ajouter un produit</button>
      <select id="sitesDropdown" style="padding:6px 8px; border:1px solid #aaa; border-radius:4px; font-size:13px; flex:1;">
        <option value="">Mes fournisseurs</option>
        <option value="https://www.amazon.fr/">Amazon</option>
        <option value="https://m.shein.com/fr/">Shein</option>
        <option value="https://www.zara.com/fr/">Zara</option>
        <option value="https://www.asos.com/fr/">ASOS</option>
        <option value="https://m2.hm.com/fr_fr/index.html">H&amp;M</option>
        <option value="https://www.uniqlo.com/fr/fr/">Uniqlo</option>
        <option value="https://m.fr.aliexpress.com/">AliExpress</option>
      </select>
    </div>
    <div class="toolbar-row">
      <button id="homeBtn" title="Accueil" style="padding:4px 6px;min-width:0;">🏠</button>
      <button id="refreshBtn" title="Rafraîchir" style="padding:4px 6px;min-width:0;">🔄</button>
      <button id="backBtn" style="padding:4px 6px;min-width:0;">←</button>
      <button id="fwdBtn" style="padding:4px 6px;min-width:0;">→</button>
      <input type="text" class="url-bar" id="urlBar" value="https://www.google.com">
      <button id="goBtn" style="padding:4px 8px;min-width:0;">Go</button>
    </div>
  </div>
  <div class="loading-indicator" id="loadingIndicator"><div class="spinner"></div> Chargement en cours...</div>
  <div class="status-bar" id="statusBar">👆 Cliquez sur le produit qui vous intéresse...</div>
  <div class="webview-wrapper">
    <webview id="browser" src="https://www.google.com"
             useragent="Mozilla/5.0 (iPhone; CPU iPhone OS 17_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.0 Mobile/15E148 Safari/604.1"
             style="flex:1"></webview>
  </div>

  <div class="product-panel" id="productPanel">
    <div class="panel-header">
      <h3 id="panelTitle">Produit détecté</h3>
      <div class="header-btns">
        <button id="minimizeBtn" title="Réduire">Réduire</button>
        <button id="closeX" title="Fermer">Fermer</button>
      </div>
    </div>
    <div class="collapsible">
      <img id="modalImg" src="" alt="Produit">

      <div class="field-row">
        <div class="field-inline"><label>Nom :</label><input type="text" id="modalName" placeholder="Nom du produit"></div>
        <div class="suggestions" id="sugName"></div>
      </div>
      <div class="field-row">
        <div class="field-inline"><label>Prix :</label><input type="text" id="modalPrice" placeholder="Prix"></div>
        <div class="suggestions" id="sugPrice"></div>
      </div>
      <div class="field-row">
        <div class="field-inline"><label>Tailles :</label><input type="text" id="modalSizes" placeholder="Tailles"></div>
        <div class="suggestions" id="sugSizes"></div>
      </div>

      <div class="panel-actions">
        <button class="save-btn" id="saveBtn">Sauvegarder</button>
        <button class="close-btn" id="closeBtn">Fermer</button>
      </div>
    </div>
  </div>

  <script>
    var urlBar = document.getElementById('urlBar');
    var browser = document.getElementById('browser');
    var goBtn = document.getElementById('goBtn');
    var backBtn = document.getElementById('backBtn');
    var fwdBtn = document.getElementById('fwdBtn');
    var btnCatalogue = document.getElementById('btnCatalogue');
    var statusBar = document.getElementById('statusBar');
    var productPanel = document.getElementById('productPanel');
    var loadingIndicator = document.getElementById('loadingIndicator');
    var pickingMode = false;
    var lastFocusedField = null;

    // Track le dernier champ éditable focus
    ['modalName', 'modalPrice', 'modalSizes'].forEach(function(id) {
      document.getElementById(id).addEventListener('focus', function() {
        lastFocusedField = this;
      });
    });

    function navigate() {
      var url = urlBar.value.trim();
      if (url && !url.startsWith('http')) {
        url = 'https://' + url;
        urlBar.value = url;
      }
      browser.loadURL(url);
    }

    goBtn.addEventListener('click', navigate);
    urlBar.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); navigate(); }
    });
    backBtn.addEventListener('click', function() { browser.goBack(); });
    fwdBtn.addEventListener('click', function() { browser.goForward(); });
    document.getElementById('homeBtn').addEventListener('click', function() { browser.loadURL('https://www.google.com'); urlBar.value = 'https://www.google.com'; });
    document.getElementById('refreshBtn').addEventListener('click', function() { browser.reload(); });
    document.getElementById('sitesDropdown').addEventListener('change', function() {
      var url = this.value;
      if (url) { browser.loadURL(url); urlBar.value = url; }
      this.selectedIndex = 0;
    });

    browser.addEventListener('did-navigate', function(e) { urlBar.value = e.url; });
    browser.addEventListener('did-navigate-in-page', function(e) { urlBar.value = e.url; });

    // Indicateur chargement (pas d'overlay bloquant)
    browser.addEventListener('did-start-loading', function() {
      loadingIndicator.classList.add('visible');
    });
    browser.addEventListener('did-stop-loading', function() {
      loadingIndicator.classList.remove('visible');
    });

    // Anti-détection bot
    browser.addEventListener('dom-ready', function() {
      browser.executeJavaScript(`
        (function() {
          Object.defineProperty(navigator, 'webdriver', { get: () => false });
          delete window.process;
          delete window.require;
          Object.defineProperty(navigator, 'plugins', { get: () => [1, 2, 3, 4, 5] });
          Object.defineProperty(navigator, 'languages', { get: () => ['fr-FR', 'fr', 'en-US', 'en'] });
          if (window.chrome) { window.chrome.runtime = undefined; }
          else { window.chrome = { runtime: undefined }; }
        })();
      `);
    });

    // Mode picking
    btnCatalogue.addEventListener('click', function() {
      pickingMode = !pickingMode;
      if (pickingMode) {
        btnCatalogue.classList.add('active');
        btnCatalogue.textContent = 'Appuyer sur un produit';
        statusBar.classList.add('visible');
        injectPicker();
      } else {
        btnCatalogue.classList.remove('active');
        btnCatalogue.textContent = 'Ajouter un produit';
        statusBar.classList.remove('visible');
        removePicker();
      }
    });

    function injectPicker() {
      browser.executeJavaScript(`
        (function() {
          if (window.__catalogPicker) return;
          window.__catalogPicker = true;

          var svgCursor = "data:image/svg+xml;utf8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="80" height="36" viewBox="0 0 80 36"><text x="0" y="14" font-family="Arial" font-size="16" fill="gold" stroke="black" stroke-width="0.5">★</text><text x="18" y="14" font-family="Arial" font-size="11" font-weight="bold" fill="white" stroke="black" stroke-width="0.8" paint-order="stroke">Celui là</text></svg>');
          document.body.style.cursor = 'url(' + svgCursor + ') 8 8, pointer';
          var cursorStyle = document.createElement('style');
          cursorStyle.id = '__catalogCursorStyle';
          cursorStyle.textContent = '* { cursor: url(' + svgCursor + ') 8 8, pointer !important; }';
          document.head.appendChild(cursorStyle);

          // Collecter toutes les autres images de la page (pour exclure les textes plus proches d'une autre image)
          function getOtherImageRects(targetImg) {
            var rects = [];
            var allImgs = document.querySelectorAll('img');
            allImgs.forEach(function(im) {
              if (im === targetImg) return;
              var r = im.getBoundingClientRect();
              if (r.width < 40 || r.height < 40) return;
              rects.push(r);
            });
            return rects;
          }

          function distToRect(cx, cy, rect) {
            var dx = Math.max(0, Math.max(rect.left - cx, cx - rect.right));
            var dy = Math.max(0, Math.max(rect.top - cy, cy - rect.bottom));
            return Math.sqrt(dx * dx + dy * dy);
          }

          function findNearbyElements(refRect, maxDist, otherImgRects) {
            maxDist = maxDist || 400;
            var all = document.querySelectorAll('span, div, p, a, h1, h2, h3, h4, label, strong, em, button');
            var found = [];
            for (var i = 0; i < all.length; i++) {
              var r = all[i].getBoundingClientRect();
              if (r.width === 0 && r.height === 0) continue;
              var cx = (r.left + r.right) / 2;
              var cy = (r.top + r.bottom) / 2;
              var distToTarget = distToRect(cx, cy, refRect);
              if (distToTarget >= maxDist) continue;

              // Exclure si plus proche d'une autre image
              var closerToOther = false;
              for (var oi = 0; oi < otherImgRects.length; oi++) {
                if (distToRect(cx, cy, otherImgRects[oi]) < distToTarget) {
                  closerToOther = true;
                  break;
                }
              }
              if (closerToOther) continue;

              var txt = all[i].textContent.trim();
              if (txt.length > 0 && txt.length < 300) {
                var pos = '';
                if (cx >= refRect.left && cx <= refRect.right && cy >= refRect.top && cy <= refRect.bottom) {
                  pos = 'dedans';
                } else if (cy > refRect.bottom) pos = 'bas';
                else if (cx > refRect.right) pos = 'droite';
                else if (cx < refRect.left) pos = 'gauche';
                else pos = 'haut';
                found.push({ text: txt, dist: distToTarget, pos: pos });
              }
            }
            found.sort(function(a, b) { return a.dist - b.dist; });
            return found;
          }

          function extractPrice(text) {
            var m = text.match(/[0-9]+[.,][0-9]{2}\\s*[€$£]/) || text.match(/[€$£]\\s*[0-9]+[.,][0-9]{2}/) || text.match(/[0-9]+[.,][0-9]{2}\\s*(EUR|USD)/i);
            return m ? m[0] : null;
          }

          function extractSizes(text) {
            var m = text.match(/\\b(XXS|XS|S|M|L|XL|XXL|XXXL|[3-4][0-9])\\b/g);
            if (m && m.length >= 1) return [...new Set(m)].join(', ');
            return null;
          }

          window.__catalogPickerHandler = function(e) {
            e.preventDefault();
            e.stopPropagation();

            var el = e.target;
            var productData = { image: null, name: null, price: null, sizes: null, nearbyTexts: [], debug: [] };

            // 1. Image
            var img = null;
            if (el.tagName === 'IMG') img = el;
            else img = el.querySelector('img');
            if (!img) {
              var current = el;
              for (var i = 0; i < 10; i++) {
                if (!current.parentElement) break;
                current = current.parentElement;
                img = current.querySelector('img');
                if (img) break;
              }
            }
            if (!img) {
              var clickX = e.clientX, clickY = e.clientY;
              var allImgs = document.querySelectorAll('img');
              var bestDist = Infinity;
              allImgs.forEach(function(im) {
                var r = im.getBoundingClientRect();
                if (r.width < 50 || r.height < 50) return;
                var cx = (r.left + r.right) / 2;
                var cy = (r.top + r.bottom) / 2;
                var d = Math.sqrt((cx - clickX) * (cx - clickX) + (cy - clickY) * (cy - clickY));
                if (d < bestDist) { bestDist = d; img = im; }
              });
            }

            if (img) {
              productData.image = img.src || img.dataset.src || img.currentSrc || '';
              if (!productData.image && img.srcset) {
                var parts = img.srcset.split(',');
                productData.image = parts[parts.length - 1].trim().split(' ')[0];
              }
            }

            // 2. Conteneur produit
            var container = el;
            for (var j = 0; j < 15; j++) {
              if (!container.parentElement) break;
              container = container.parentElement;
              var tagName = container.tagName.toLowerCase();
              if (tagName === 'article' || tagName === 'li' || tagName === 'section' ||
                  (container.className && typeof container.className === 'string' &&
                   (container.className.toLowerCase().includes('product') ||
                    container.className.toLowerCase().includes('item') ||
                    container.className.toLowerCase().includes('card')))) {
                break;
              }
            }

            // 3. Extraire depuis le conteneur DOM
            var nameSelectors = 'a[class*="name"], a[class*="Name"], h2, h3, h4, [class*="name"], [class*="Name"], [class*="description"], [class*="Description"], [class*="title"], [class*="Title"], [class*="product-link"]';
            var nameEl = container.querySelector(nameSelectors);
            if (nameEl) productData.name = nameEl.textContent.trim();
            if (!productData.name) {
              var allLinks = container.querySelectorAll('a');
              for (var k = 0; k < allLinks.length; k++) {
                var linkText = allLinks[k].textContent.trim();
                if (linkText.length > 3 && linkText.length < 200 && !linkText.match(/^[0-9.,\\s€$£]+$/)) {
                  productData.name = linkText;
                  break;
                }
              }
            }

            var priceEl = container.querySelector('[class*="price"], [class*="Price"], [class*="amount"], [data-qa*="price"], .money, [class*="sale"]');
            if (priceEl) productData.price = priceEl.textContent.trim();
            if (!productData.price) {
              var p = extractPrice(container.innerText || '');
              if (p) productData.price = p;
            }

            var sizeEls = container.querySelectorAll('[class*="size"], [class*="Size"], [class*="taille"], [data-qa*="size"]');
            var sizes = [];
            sizeEls.forEach(function(s) {
              var t = s.textContent.trim();
              if (t && t.length < 20) sizes.push(t);
            });
            if (sizes.length > 0) productData.sizes = sizes.join(', ');
            if (!productData.sizes) {
              var sz = extractSizes(container.innerText || '');
              if (sz) productData.sizes = sz;
            }

            // 4. Toujours collecter les textes proches pour les boutons suggestions
            if (img) {
              var imgRect = img.getBoundingClientRect();
              var otherImgRects = getOtherImageRects(img);
              var nearby = findNearbyElements(imgRect, 500, otherImgRects);

              // Dédupliquer par texte
              var seen = {};
              var posOrder = { 'bas': 0, 'droite': 1, 'gauche': 2, 'haut': 3, 'dedans': 4 };
              nearby.sort(function(a, b) {
                var pa = posOrder[a.pos] !== undefined ? posOrder[a.pos] : 5;
                var pb = posOrder[b.pos] !== undefined ? posOrder[b.pos] : 5;
                if (pa !== pb) return pa - pb;
                return a.dist - b.dist;
              });

              for (var n = 0; n < nearby.length; n++) {
                var item = nearby[n];
                var txt = item.text;
                if (txt.length < 2 || txt.length > 200) continue;
                if (seen[txt]) continue;
                seen[txt] = true;
                productData.nearbyTexts.push({ text: txt, pos: item.pos });

                // Aussi tenter extraction si manquant
                if (!productData.price) {
                  var pFound = extractPrice(txt);
                  if (pFound) productData.price = pFound;
                }
                if (!productData.sizes) {
                  var sFound = extractSizes(txt);
                  if (sFound) productData.sizes = sFound;
                }
                if (!productData.name) {
                  if (txt.length > 3 && txt.length < 200 &&
                      !txt.match(/^[0-9.,\\s€$£]+$/) &&
                      !txt.match(/^(XXS|XS|S|M|L|XL|XXL|XXXL|[3-4][0-9])$/) &&
                      !extractPrice(txt)) {
                    productData.name = txt;
                  }
                }
              }

              if (!productData.name && img) {
                if (img.alt && img.alt.length > 3) productData.name = img.alt;
                else if (img.getAttribute('aria-label')) productData.name = img.getAttribute('aria-label');
              }
            }

            window.__catalogPickerData = productData;

            // Cleanup
            document.body.style.cursor = '';
            var cs = document.getElementById('__catalogCursorStyle');
            if (cs) cs.remove();
            document.removeEventListener('click', window.__catalogPickerHandler, true);
            window.__catalogPicker = false;
          };

          document.addEventListener('click', window.__catalogPickerHandler, true);
        })();
        'picker_injected';
      `).then(function() {
        console.log('Picker injecté');
      });
    }

    function removePicker() {
      browser.executeJavaScript(`
        (function() {
          document.body.style.cursor = '';
          var cs = document.getElementById('__catalogCursorStyle');
          if (cs) cs.remove();
          if (window.__catalogPickerHandler) {
            document.removeEventListener('click', window.__catalogPickerHandler, true);
          }
          window.__catalogPicker = false;
        })();
      `);
    }

    // Polling données picker
    var pollInterval = null;

    btnCatalogue.addEventListener('click', function() {
      if (pickingMode) {
        pollInterval = setInterval(function() {
          browser.executeJavaScript('JSON.stringify(window.__catalogPickerData || null)')
            .then(function(result) {
              var data = JSON.parse(result);
              if (data) {
                clearInterval(pollInterval);
                pollInterval = null;
                pickingMode = false;
                btnCatalogue.classList.remove('active');
                btnCatalogue.textContent = 'Ajouter un produit';
                statusBar.classList.remove('visible');

                showProductModal(data);
                browser.executeJavaScript('window.__catalogPickerData = null;');
              }
            });
        }, 500);
      } else {
        if (pollInterval) {
          clearInterval(pollInterval);
          pollInterval = null;
        }
      }
    });

    function showProductModal(data) {
      document.getElementById('modalImg').src = data.image || '';
      document.getElementById('modalImg').style.display = data.image ? 'block' : 'none';

      // Remplir les champs éditables
      document.getElementById('modalName').value = data.name || '';
      document.getElementById('modalPrice').value = data.price || '';
      document.getElementById('modalSizes').value = data.sizes || '';

      // Focus par défaut sur le champ nom
      lastFocusedField = document.getElementById('modalName');

      // Créer les boutons suggestions depuis les textes trouvés autour de l'image
      buildSuggestionButtons(data.nearbyTexts || []);

      // Reset état minimisé
      productPanel.classList.remove('minimized');
      document.getElementById('minimizeBtn').textContent = 'Réduire';
      document.getElementById('minimizeBtn').title = 'Réduire';
      productPanel.classList.add('visible');
    }

    // Mots/phrases exacts filtrés
    var FILTER_EXACT = ['voir', 'cuir', 'bomber', 'bombers', 'matière synthétique', 'seconde-main', 'seconde main',
      'nouveau', 'nouveauté', 'ajouter', 'panier', 'favoris', 'wishlist', 'couleur', 'couleurs',
      'livraison', 'gratuite', 'retour', 'similaire', 'similaires', 'détails', 'description',
      'polyester', 'coton', 'viscose', 'nylon', 'élasthanne', 'laine', 'lin', 'soie', 'acrylique',
      'trier', 'filtrer', 'menu', 'fermer', 'rechercher', 'connexion', 'inscription',
      'aide', 'contact', 'accueil', 'homme', 'femme', 'enfant', 'bébé', 'soldes'];

    // Patterns qui indiquent du bruit UI/navigation (contient)
    var FILTER_PATTERNS = [
      /menu de navigation/i,
      /aller au contenu/i,
      /commence[rz]?\s+(à|a)\s+taper/i,
      /lancer\s+(ta|la|une)\s+recherch/i,
      /plus d.infos/i,
      /classement/i,
      /styles?\s+trouv/i,
      /\d+\s+styles?\b/i,
      /\d+\s+résultats?\b/i,
      /\d+\s+articles?\s+trouvé/i,
      /ça part vite/i,
      /vente flash/i,
      /livraison\s+(gratuite|offerte|express)/i,
      /retours?\s+gratuit/i,
      /accueil\s*[›>»\/]/i,
      /[›>»]\s*(homme|femme|enfant|bébé)/i,
      /fil d.ariane/i,
      /breadcrumb/i,
      /^t-shirts?\s+(et|&|imprimé|uni|pour)/i,
      /^(pantalons?|jupes?|robes?|vestes?|manteaux?|chaussures?)\s+(et|&|pour|de)/i,
      /catégorie/i,
      /sous-catégorie/i,
      /newsletter/i,
      /cookies?/i,
      /politique\s+de/i,
      /conditions\s+(générales|d)/i,
      /droits?\s+réservé/i,
      /©/,
      /^(voir|afficher)\s+(tout|plus|moins|les)/i,
      /^(trier|filtrer)\s*(par)?$/i
    ];

    // Détecte si un texte contient un prix
    function looksLikePrice(txt) {
      return /[0-9]+[.,][0-9]{2}\s*[€$£]/.test(txt) ||
             /[€$£]\s*[0-9]+[.,][0-9]{2}/.test(txt) ||
             /[0-9]+[.,][0-9]{2}\s*(EUR|USD)/i.test(txt) ||
             /^\s*[€$£]?\s*[0-9]+([.,][0-9]{0,2})?\s*[€$£]\s*$/.test(txt);
    }

    // Détecte si un texte contient des tailles vêtement
    function looksLikeSize(txt) {
      return /\b(XXS|XS|XXL|XXXL|XL)\b/i.test(txt) ||
             /\b(3[2-9]|4[0-9]|5[0-2])\b/.test(txt) ||
             /^\s*[SML]\s*$/i.test(txt) ||
             /\b[SML]\b/.test(txt) && /\b(taille|size|pointure)\b/i.test(txt);
    }

    // Détecte si un texte est un vrai candidat nom de produit
    function looksLikeProductName(txt) {
      var lower = txt.toLowerCase().trim();
      // Trop court
      if (lower.length < 5) return false;
      // C'est un prix pur
      if (/^\s*[€$£]?\s*[0-9]+([.,][0-9]{0,2})?\s*[€$£]?\s*$/.test(txt)) return false;
      // C'est une taille seule
      if (/^\s*(XXS|XS|S|M|L|XL|XXL|XXXL|[3-4][0-9])\s*$/i.test(txt)) return false;
      // Pourcentage seul
      if (/^\s*-?\s*[0-9]+\s*%\s*$/.test(txt)) return false;
      // Mot filtré exact
      if (FILTER_EXACT.indexOf(lower) !== -1) return false;
      // Pattern UI/navigation
      for (var i = 0; i < FILTER_PATTERNS.length; i++) {
        if (FILTER_PATTERNS[i].test(lower)) return false;
      }
      // Que des chiffres/symboles
      if (/^[\d\s.,€$£%+-]+$/.test(txt)) return false;
      return true;
    }

    function makeSugBtn(txt, pos, fieldId) {
      var btn = document.createElement('button');
      btn.className = 'sug-btn';
      btn.type = 'button';
      btn.title = txt;
      btn.innerHTML = '<span class="sug-pos">' + pos + '</span>' + escapeHtml(txt.length > 40 ? txt.substring(0, 40) + '...' : txt);
      btn.addEventListener('click', function() {
        var field = document.getElementById(fieldId);
        if (field.value && field.value.length > 0) {
          field.value += ' ' + txt;
        } else {
          field.value = txt;
        }
        field.focus();
        lastFocusedField = field;
      });
      return btn;
    }

    function buildSuggestionButtons(nearbyTexts) {
      var sugName = document.getElementById('sugName');
      var sugPrice = document.getElementById('sugPrice');
      var sugSizes = document.getElementById('sugSizes');
      sugName.innerHTML = '';
      sugPrice.innerHTML = '';
      sugSizes.innerHTML = '';

      // 1. Dédoublonner exact (lowercase)
      var seenLower = {};
      var deduped = [];
      nearbyTexts.forEach(function(item) {
        var key = item.text.toLowerCase().trim();
        if (seenLower[key]) return;
        seenLower[key] = true;
        deduped.push(item);
      });

      // 2. Éliminer les sous-chaînes
      var unique = deduped.filter(function(item, idx) {
        var lower = item.text.toLowerCase().trim();
        for (var j = 0; j < deduped.length; j++) {
          if (j === idx) continue;
          var otherLower = deduped[j].text.toLowerCase().trim();
          if (otherLower.length > lower.length && otherLower.indexOf(lower) !== -1) return false;
        }
        return true;
      });

      // 3. Dispatch par champ avec filtrage spécifique
      var seenName = {}, seenPrice = {}, seenSize = {};

      unique.forEach(function(item) {
        var txt = item.text;
        var pos = item.pos;
        var lower = txt.toLowerCase().trim();

        // === NOM : que les vrais candidats noms de produit ===
        if (looksLikeProductName(txt) && !seenName[lower]) {
          seenName[lower] = true;
          sugName.appendChild(makeSugBtn(txt, pos, 'modalName'));
        }

        // === PRIX : que les textes qui contiennent un montant ===
        if (looksLikePrice(txt) && !seenPrice[lower]) {
          seenPrice[lower] = true;
          sugPrice.appendChild(makeSugBtn(txt, pos, 'modalPrice'));
        }

        // === TAILLES : que les textes qui contiennent des tailles vêtement ===
        if (looksLikeSize(txt) && !seenSize[lower]) {
          seenSize[lower] = true;
          sugSizes.appendChild(makeSugBtn(txt, pos, 'modalSizes'));
        }
      });
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function closePanel() {
      productPanel.classList.remove('visible');
      productPanel.classList.remove('minimized');
    }

    document.getElementById('closeBtn').addEventListener('click', closePanel);
    document.getElementById('closeX').addEventListener('click', closePanel);

    // Réduire / Restaurer (cache titre + photo + tout le collapsible)
    document.getElementById('minimizeBtn').addEventListener('click', function() {
      var isMinimized = productPanel.classList.toggle('minimized');
      this.textContent = isMinimized ? 'Restaurer' : 'Réduire';
      this.title = isMinimized ? 'Restaurer' : 'Réduire';
    });

    document.getElementById('saveBtn').addEventListener('click', function() {
      closePanel();
      statusBar.textContent = '✅ Produit sauvegardé dans le catalogue !';
      statusBar.classList.add('visible');
      setTimeout(function() { statusBar.classList.remove('visible'); }, 3000);
    });
  </script>
</body>
</html>
